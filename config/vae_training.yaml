data_dir: "./data/FFHQ/"
output_dir: "./output/"
batch_size: 48
grad_accumulation: 4

model:
  num_gaussians: 1000
  input_dim: 8
  model_dim: 512

train:
  max_epochs: 5000
  base_lr: 0.00005      # 5e-5
  lr_warmup_epochs: 150
  kl_warmup_epochs: 500
  lpips_warmup_epochs: 1000
  sinkhorn_warmup_epochs: 200
  clip_norm: 2.5
  
  # Weights
  max_kl_weight: 0.1
  recon_weight: 0.1
  lpips_weight: 100.0

logging:
  sample_save_rate: 500
  reconstruct_save_rate: 100