data_dir: "/scratch/leuven/366/vsc36675/images/FFHQ/"
output_dir: "./output/FFHQ_restart2/"
batch_size: 32
grad_accumulation: 1
overfit: false
validation_split: 0.05

# --- Resume settings ---
resume_from: "./output/FFHQ_restart/best_gaussian_vae.pth"
resume_epoch: 190

# --- Sinkhorn epsilon schedule ---
# Epoch 190 ended at eps ≈ 0.0225 (halfway through the previous 0.03→0.015 decay).
# Continue tightening at the same pace: 0.0225 → 0.012 over 100 epochs.
sinkhorn_eps_start: 0.0225
sinkhorn_eps_end: 0.012
sinkhorn_eps_decay_epochs: 100

model:
  num_gaussians: 5000
  input_dim: 8
  model_dim: 1024
  decoder_transformer_layers: 8
  decoder_transformer_heads: 8

train:
  # Number of ADDITIONAL epochs to train from the resume point.
  # Increase this value (and the SLURM walltime) if you need more.
  max_epochs: 50

  base_lr: 0.0005
  lr_warmup_epochs: 100   # must match original run so fast-forward is correct

  target_recon_weight: 1.0

  target_kl_weight: 0.0001
  kl_disabled_epochs: 10
  kl_warmup_epochs: 15

  clip_norm: 1.0

logging:
  sample_save_rate: 5000      # effectively disabled for a 50-epoch run
  reconstruct_save_rate: 5    # reconstruction image every 5 epochs
  model_save_rate: 10         # checkpoint every 10 epochs
