data_dir: "./data/FFHQ_subset/"
output_dir: "./output/FFHQ_subset/"
batch_size: 12
grad_accumulation: 1
overfit: false
validation_split: 0.05

model:
  num_gaussians: 5000
  input_dim: 8
  model_dim: 1024
  decoder_transformer_layers: 8
  decoder_transformer_heads: 8

train:
  max_epochs: 200

  base_lr: 0.0005      # 5e-5
  lr_warmup_epochs: 100

  target_recon_weight: 1.0

  target_kl_weight: 0.0001
  kl_disabled_epochs: 5
  kl_warmup_epochs: 20

  sinkhorn_warmup_epochs: 250
  clip_norm: 1.0

logging:
  sample_save_rate: 200
  reconstruct_save_rate: 100
  model_save_rate: 500
